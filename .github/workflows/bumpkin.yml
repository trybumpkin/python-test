name: Bumpkin Release
run-name: >-
  ${{
    github.event_name == 'workflow_dispatch' &&
    inputs.operation == 'release_publish' &&
    'Bumpkin Publish' ||
    'Bumpkin Preview'
  }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      operation:
        description: "Choose whether to preview or publish the next release"
        required: true
        default: release_preview
        type: choice
        options:
          - release_preview
          - release_publish
      base_tag:
        description: "Optional previous tag override"
        required: false
        default: ""
      preview_run_id:
        description: "Optional preview workflow run id to publish from"
        required: false
        default: ""

concurrency:
  group: bumpkin-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write
  pull-requests: read

env:
  BUMPKIN_OPERATION: >-
    ${{
      github.event_name == 'workflow_dispatch' &&
      inputs.operation ||
      'release_preview'
    }}
  BUMPKIN_BASE_TAG: >-
    ${{
      github.event_name == 'workflow_dispatch' &&
      inputs.base_tag ||
      ''
    }}
  BUMPKIN_PREVIEW_RUN_ID: >-
    ${{
      github.event_name == 'workflow_dispatch' &&
      inputs.preview_run_id ||
      ''
    }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: bumpkin
        name: Run Bumpkin release workflow
        uses: trybumpkin/bumpkin@codex/fix-preview-rationale
        with:
          operation: ${{ env.BUMPKIN_OPERATION }}
          base_tag: ${{ env.BUMPKIN_BASE_TAG }}
          preview_run_id: ${{ env.BUMPKIN_PREVIEW_RUN_ID }}
          model: ${{ secrets.BUMPKIN_MODEL }}
          fallback_model: ${{ secrets.BUMPKIN_FALLBACK_MODEL || '' }}
          models_endpoint: ${{ secrets.BUMPKIN_MODELS_ENDPOINT }}
          models_token: ${{ secrets.MODELS_TOKEN }}
          request_timeout: "45"
          model_call_min_interval_ms: "4000"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: bumpkin-release-notes
          path: ${{ steps.bumpkin.outputs.release_notes_path }}
          if-no-files-found: error

      - name: Upload release candidate artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bumpkin.outputs.release_candidate_artifact_name }}
          path: ${{ steps.bumpkin.outputs.release_candidate_path }}
          if-no-files-found: error

      - name: Print release summary
        shell: bash
        run: |
          set -euo pipefail
          echo "status=${{ steps.bumpkin.outputs.release_status }}"
          echo "previous_tag=${{ steps.bumpkin.outputs.release_previous_tag }}"
          echo "next_tag=${{ steps.bumpkin.outputs.release_next_tag }}"
          echo "release_label=${{ steps.bumpkin.outputs.release_label }}"
          echo "release_pr_count=${{ steps.bumpkin.outputs.release_pr_count }}"
          echo "release_candidate_run_id=${{ steps.bumpkin.outputs.release_candidate_run_id }}"
          echo "release_candidate_path=${{ steps.bumpkin.outputs.release_candidate_path }}"
          echo "release_url=${{ steps.bumpkin.outputs.release_url }}"
          echo "tag_url=${{ steps.bumpkin.outputs.tag_url }}"
